<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DD Washer Digital Twin</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111827;
      color: #f9fafb;
      font-family: Arial, Helvetica, sans-serif;
    }
    #viewer {
      width: 100vw;
      height: 100vh;
      display: block;
    }
    #hud {
      position: fixed;
      left: 18px;
      top: 16px;
      max-width: 560px;
      padding: 14px 16px;
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 14px;
      background: rgba(17, 24, 39, 0.78);
      backdrop-filter: blur(8px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.35);
    }
    #hud h1 {
      margin: 0 0 8px;
      font-size: 18px;
      letter-spacing: 0.3px;
    }
    .row {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 8px;
      margin: 4px 0;
      font-size: 13px;
    }
    .key { color: #93c5fd; }
    .value { color: #f9fafb; }
    #controls {
      position: fixed;
      left: 18px;
      right: 18px;
      bottom: 18px;
      display: grid;
      grid-template-columns: 92px 1fr 92px;
      align-items: center;
      gap: 14px;
      padding: 12px 14px;
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 14px;
      background: rgba(17, 24, 39, 0.78);
      backdrop-filter: blur(8px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.35);
    }
    button {
      height: 36px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: #1d4ed8; }
    input[type=range] { width: 100%; }
    #hint {
      position: fixed;
      right: 18px;
      top: 16px;
      padding: 10px 12px;
      border-radius: 12px;
      color: #cbd5e1;
      background: rgba(17, 24, 39, 0.62);
      font-size: 12px;
    }
    #loadError {
      display: none;
      position: fixed;
      inset: 0;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #fff;
      background: #111827;
      text-align: center;
      line-height: 1.5;
    }
  </style>
</head>

  const matDark = new THREE.MeshStandardMaterial({ color: 0x0f172a, roughness: 0.54, metalness: 0.15 });
  const matCopper = new THREE.MeshStandardMaterial({ color: 0xb45309, metalness: 0.42, roughness: 0.28 });
  const matBlue = new THREE.MeshStandardMaterial({ color: 0x2563eb, roughness: 0.42, metalness: 0.12 });
  const matOrange = new THREE.MeshStandardMaterial({ color: 0xf97316, roughness: 0.44, metalness: 0.12 });
  const matRed = new THREE.MeshStandardMaterial({ color: 0xef4444, roughness: 0.34, metalness: 0.08 });
  const matCloth = new THREE.MeshStandardMaterial({ color: 0xfbbf24, roughness: 0.85, metalness: 0.0 });

  function box(w, h, d, mat, x, y, z) {
    const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
    mesh.position.set(x, y, z);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    return mesh;
  }

  function cyl(radius, depth, mat, radialSegments = 64) {
    const mesh = new THREE.Mesh(new THREE.CylinderGeometry(radius, radius, depth, radialSegments, 1, false), mat);
    mesh.rotation.x = Math.PI / 2;
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    return mesh;
  }

  function torus(radius, tube, mat, radialSegments = 96) {
    const mesh = new THREE.Mesh(new THREE.TorusGeometry(radius, tube, 18, radialSegments), mat);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    return mesh;
  }

  const W = p.cabinetWidth;
  const H = p.cabinetHeight;
  const D = p.cabinetDepth;
  const frontZ = -D / 2;
  const rearZ = D / 2;
  const dcY = p.drumCenterHeight;
  const rDrum = p.drumRadius;
  const dDrum = p.drumDepth;

  const cabinet = new THREE.Group();
  cabinet.add(box(W, 0.020, D, matWhite, 0, H - 0.010, 0));
  cabinet.add(box(W, 0.020, D, matWhite, 0, 0.010, 0));
  cabinet.add(box(0.020, H, D, matSide, -W / 2 + 0.010, H / 2, 0));
  cabinet.add(box(0.020, H, D, matSide, W / 2 - 0.010, H / 2, 0));
  cabinet.add(box(W, H, 0.020, matSide, 0, H / 2, rearZ - 0.010));
  cabinet.add(box(W, 0.060, 0.030, matWhite, 0, H - 0.030, frontZ - 0.010));
  cabinet.add(box(W, 0.095, 0.030, matWhite, 0, 0.047, frontZ - 0.010));
  cabinet.add(box(0.070, H, 0.030, matWhite, -W / 2 + 0.035, H / 2, frontZ - 0.010));
  cabinet.add(box(0.070, H, 0.030, matWhite, W / 2 - 0.035, H / 2, frontZ - 0.010));
  cabinet.add(box(0.215, 0.044, 0.036, matDark, -0.115, H - 0.052, frontZ - 0.028));
  cabinet.add(box(0.100, 0.032, 0.036, matBlue, 0.105, H - 0.052, frontZ - 0.030));
  cabinet.add(cyl(0.032, 0.030, matChrome, 48));
  cabinet.children[cabinet.children.length - 1].position.set(0.205, H - 0.052, frontZ - 0.035);
  scene.add(cabinet);

  const doorRing = torus(rDrum * 1.10, 0.018, matChrome, 112);
  doorRing.position.set(0, dcY, frontZ - 0.038);
  scene.add(doorRing);

  const doorGlass = cyl(rDrum * 0.88, 0.015, matGlass, 112);
  doorGlass.position.set(0, dcY, frontZ - 0.044);
  scene.add(doorGlass);

  const handle = box(0.024, 0.110, 0.025, matChrome, rDrum * 1.08, dcY, frontZ - 0.060);
  scene.add(handle);

  const tubGroup = new THREE.Group();
  scene.add(tubGroup);

  const drumSpin = new THREE.Group();
  drumSpin.position.set(0, dcY, 0);
  tubGroup.add(drumSpin);

  const drumShell = cyl(rDrum, dDrum, matDrum, 96);
  drumSpin.add(drumShell);

  for (let i = 0; i < 6; i++) {
    const z = -dDrum / 2 + i * dDrum / 5;
    const ring = torus(rDrum, 0.0045, matChrome, 96);
    ring.position.z = z;
    drumSpin.add(ring);
  }
  for (let i = 0; i < 14; i++) {
    const angle = i * Math.PI * 2 / 14;
    const rib = box(0.012, 0.012, dDrum, matChrome, Math.cos(angle) * rDrum, Math.sin(angle) * rDrum, 0);
    rib.rotation.z = angle;
    drumSpin.add(rib);
  }
  const holeGeom = new THREE.SphereGeometry(0.0048, 8, 8);
  const holeMat = new THREE.MeshStandardMaterial({ color: 0x1e293b, roughness: 0.5, metalness: 0.1 });
  for (let zi = 0; zi < 9; zi++) {
    const z = -dDrum * 0.42 + zi * dDrum * 0.105;
    for (let ai = 0; ai < 18; ai++) {
      const angle = ai * Math.PI * 2 / 18 + zi * 0.17;
      const dot = new THREE.Mesh(holeGeom, holeMat);
      dot.position.set(Math.cos(angle) * rDrum * 1.006, Math.sin(angle) * rDrum * 1.006, z);
      drumSpin.add(dot);
    }
  }

  const laundryGroup = new THREE.Group();
  const clothGeom = new THREE.SphereGeometry(0.032, 16, 12);
  for (let i = 0; i < 7; i++) {
    const a = i * Math.PI * 2 / 7 + 0.4;
    const cloth = new THREE.Mesh(clothGeom, matCloth);
    cloth.scale.set(1.0, 0.72 + 0.12 * (i % 3), 0.86);
    cloth.position.set(Math.cos(a) * rDrum * 0.48, Math.sin(a) * rDrum * 0.48, -0.14 + i * 0.047);
    cloth.castShadow = true;
    laundryGroup.add(cloth);
  }
  drumSpin.add(laundryGroup);

  const unbalance = new THREE.Mesh(new THREE.SphereGeometry(0.026, 18, 14), matRed);
  unbalance.position.set(p.unbalanceRadius, 0, 0);
  unbalance.castShadow = true;
  drumSpin.add(unbalance);

  const ddGroup = new THREE.Group();
  ddGroup.position.set(0, dcY, 0);
  tubGroup.add(ddGroup);
  const motorZ = dDrum / 2 + 0.050;
  const stator = torus(rDrum * 0.86, 0.013, matCopper, 128);
  stator.position.z = motorZ;
  ddGroup.add(stator);
  const statorInner = torus(rDrum * 0.68, 0.006, matCopper, 128);
  statorInner.position.z = motorZ + 0.004;
  ddGroup.add(statorInner);
  for (let i = 0; i < 18; i++) {
    const a = i * Math.PI * 2 / 18;
    const coil = box(0.014, 0.050, 0.014, matCopper, Math.cos(a) * rDrum * 0.78, Math.sin(a) * rDrum * 0.78, motorZ);
    coil.rotation.z = a;
    ddGroup.add(coil);
  }

  const rotorGroup = new THREE.Group();
  rotorGroup.position.z = motorZ + 0.018;
  ddGroup.add(rotorGroup);
  const rotorRing = torus(rDrum * 0.58, 0.012, matChrome, 96);
  rotorGroup.add(rotorRing);
  const hub = cyl(rDrum * 0.18, 0.020, matChrome, 64);
  hub.rotation.x = Math.PI / 2;
  rotorGroup.add(hub);
  for (let i = 0; i < 8; i++) {
    const a = i * Math.PI * 2 / 8;
    const spoke = box(rDrum * 0.43, 0.012, 0.012, matChrome, Math.cos(a) * rDrum * 0.34, Math.sin(a) * rDrum * 0.34, 0);
    spoke.rotation.z = a;
    rotorGroup.add(spoke);
  }
  const shaft = cyl(rDrum * 0.055, dDrum + 0.110, matChrome, 48);
  shaft.position.z = 0.025;
  ddGroup.add(shaft);

  const springLines = [];
  const springMat = new THREE.LineBasicMaterial({ color: 0xf97316, linewidth: 3 });
  const anchorPts = [
    [-W * 0.38, H * 0.90, 0],
    [ W * 0.38, H * 0.90, 0],
    [-W * 0.38, H * 0.07, 0],
    [ W * 0.38, H * 0.07, 0]
  ];
  const mountLocal = [
    [-rDrum * 0.70, dcY + rDrum * 0.70, 0],
    [ rDrum * 0.70, dcY + rDrum * 0.70, 0],
    [-rDrum * 0.70, dcY - rDrum * 0.70, 0],
    [ rDrum * 0.70, dcY - rDrum * 0.70, 0]
  ];
  for (let i = 0; i < 4; i++) {
    const geo = new THREE.BufferGeometry();
    geo.setFromPoints([new THREE.Vector3(), new THREE.Vector3()]);
    const line = new THREE.Line(geo, springMat);
    scene.add(line);
    springLines.push(line);
  }

  const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(2.2, 2.2),
    new THREE.MeshStandardMaterial({ color: 0x0f172a, roughness: 0.9, metalness: 0.0 })
  );
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = -0.002;
  ground.receiveShadow = true;
  scene.add(ground);

  document.getElementById('model').textContent = `${p.model} | cabinet ${Math.round(W*1000)} x ${Math.round(D*1000)} x ${Math.round(H*1000)} mm`;
  document.getElementById('motor').textContent =
    `${p.ratedPowerW.toFixed(0)} W, ${p.ratedSpeedRpm.toFixed(0)} rpm, ${p.ratedTorqueNm.toFixed(2)} N m rated, ${p.peakTorqueNm.toFixed(2)} N m peak`;

  const urlParams = new URLSearchParams(window.location.search);
  const recordMode = urlParams.get('record') === '1';
  const playbackRate = Number(urlParams.get('rate') || (recordMode ? '3.0' : '1.2'));
  const playOnce = recordMode || urlParams.get('once') === '1';
  const defaultStart = recordMode ? SIM.t[0] : Math.min(SIM.t[SIM.t.length - 1] - 4.0, 56.0);
  const requestedStart = Number(urlParams.get('start'));
  let playing = true;
  let simTime = Number.isFinite(requestedStart)
    ? Math.max(SIM.t[0], Math.min(SIM.t[SIM.t.length - 1], requestedStart))
    : defaultStart;
  window.__WM_RECORDING_DONE__ = false;
  let lastReal = performance.now();
  const slider = document.getElementById('timeSlider');
  const playBtn = document.getElementById('playBtn');
  const timeReadout = document.getElementById('timeReadout');
  playBtn.addEventListener('click', () => {
    playing = !playing;
    playBtn.textContent = playing ? 'Pause' : 'Play';
  });
  slider.addEventListener('input', () => {
    simTime = SIM.t[0] + (SIM.t[SIM.t.length - 1] - SIM.t[0]) * Number(slider.value) / 1000;
    playing = false;
    playBtn.textContent = 'Play';
    updateModel(sampleAt(simTime));
  });

  function sampleAt(t) {
    const arr = SIM.t;
    if (t <= arr[0]) return unpack(0, 0, 0);
    const last = arr.length - 1;
    if (t >= arr[last]) return unpack(last, last, 0);
    let lo = 0;
    let hi = last;
    while (hi - lo > 1) {
      const mid = (lo + hi) >> 1;
      if (arr[mid] <= t) lo = mid; else hi = mid;
    }
    const f = (t - arr[lo]) / (arr[hi] - arr[lo]);
    return unpack(lo, hi, f);
  }

  function lerp(a, b, f) { return a + (b - a) * f; }
  function angleLerp(a, b, f) {
    let d = b - a;
    if (d > Math.PI) d -= Math.PI * 2;
    if (d < -Math.PI) d += Math.PI * 2;
    return a + d * f;
  }
  function unpack(i, j, f) {
    return {
      t: lerp(SIM.t[i], SIM.t[j], f),
      theta: lerp(SIM.theta[i], SIM.theta[j], f),
      x: lerp(SIM.x[i], SIM.x[j], f),
      z: lerp(SIM.z[i], SIM.z[j], f),
      rpm: lerp(SIM.rpm[i], SIM.rpm[j], f),
      iq: lerp(SIM.iq[i], SIM.iq[j], f),
      m: lerp(SIM.m_est_g[i], SIM.m_est_g[j], f),
      phase: f < 0.5 ? SIM.phase[i] : SIM.phase[j]
    };
  }

  function updateSprings(xVis, yVis) {
    for (let i = 0; i < 4; i++) {
      const a = anchorPts[i];
      const m = mountLocal[i];
      const pts = [
        new THREE.Vector3(a[0], a[1], a[2]),
        new THREE.Vector3(m[0] + xVis, m[1] + yVis, m[2])
      ];
      springLines[i].geometry.setFromPoints(pts);
    }
  }

  function updateModel(s) {
    const xVis = s.x * SIM.visualScale;
    const yVis = s.z * SIM.visualScale;
    tubGroup.position.set(xVis, yVis, 0);
    drumSpin.rotation.z = s.theta;
    rotorGroup.rotation.z = s.theta;
    laundryGroup.rotation.z = -s.theta * 0.35;
    updateSprings(xVis, yVis);

    const vib = Math.hypot(s.x, s.z) * 1000;
    document.getElementById('simStatus').textContent =
      `t=${s.t.toFixed(1)} s | ${s.phase} | speed=${s.rpm.toFixed(1)} rpm | iq=${s.iq.toFixed(2)} A`;
    document.getElementById('vibStatus').textContent =
      `x=${(s.x*1000).toFixed(3)} mm, z=${(s.z*1000).toFixed(3)} mm, total=${vib.toFixed(3)} mm (${SIM.visualScale.toFixed(0)}x visual)`;
    document.getElementById('ubStatus').textContent =
      `actual=${p.unbalanceMassG.toFixed(0)} g | estimated=${s.m.toFixed(1)} g | coaxial DD rotor`;
    timeReadout.textContent = `${s.t.toFixed(1)} s`;
    slider.value = String(Math.round(1000 * (s.t - SIM.t[0]) / (SIM.t[SIM.t.length - 1] - SIM.t[0])));
  }

  function resize() {
    const width = window.innerWidth;
    const height = window.innerHeight;
    renderer.setSize(width, height, false);
    camera.aspect = width / height;
    camera.updateProjectionMatrix();
  }
  window.addEventListener('resize', resize);
  resize();

  let dragging = false;
  let lastX = 0;
  let lastY = 0;
  canvas.addEventListener('pointerdown', (e) => {
    dragging = true;
    lastX = e.clientX;
    lastY = e.clientY;
    canvas.setPointerCapture(e.pointerId);
  });
  canvas.addEventListener('pointermove', (e) => {
    if (!dragging) return;
    const dx = e.clientX - lastX;
    const dy = e.clientY - lastY;
    lastX = e.clientX;
    lastY = e.clientY;
    camAz -= dx * 0.006;
    camEl = Math.max(-0.12, Math.min(0.95, camEl + dy * 0.004));
    updateCamera();
  });
  canvas.addEventListener('pointerup', (e) => {
    dragging = false;
    try { canvas.releasePointerCapture(e.pointerId); } catch (_) {}
  });
  canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    camRadius = Math.max(0.85, Math.min(2.7, camRadius * (1 + e.deltaY * 0.001)));
    updateCamera();
  }, { passive: false });

  function animate(now) {
    const dt = Math.min(0.05, (now - lastReal) / 1000);
    lastReal = now;
    if (playing) {
      simTime += dt * playbackRate;
      const end = SIM.t[SIM.t.length - 1];
      if (simTime > end) {
        if (playOnce) {
          simTime = end;
          playing = false;
          playBtn.textContent = 'Play';
          window.__WM_RECORDING_DONE__ = true;
        } else {
          simTime = SIM.t[0];
        }
      }
    }
    updateModel(sampleAt(simTime));
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
  }
  updateModel(sampleAt(simTime));
  requestAnimationFrame(animate);
}
</script>
</body>
</html>
